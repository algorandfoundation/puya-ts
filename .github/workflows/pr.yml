name: Pull Request

on:
  pull_request:
    branches:
      - main
      - alpha

permissions:
  contents: read
  checks: write

jobs:
  ci-all:
    name: "Build and test all packages"
    uses: ./.github/workflows/ci-all.yml
    with:
      run-commit-lint: true

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: docs/package.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile --dir docs

      - name: Verify documentation builds
        run: pnpm --dir docs run build

  verify-examples:
    name: 'Verify examples'
    runs-on: ubuntu-latest
    needs:
      - ci-all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Download puya-ts artifact
        uses: actions/download-artifact@v4
        with:
          pattern: puya-ts-node-*
          path: ./dist
          merge-multiple: true

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install examples dependencies
        working-directory: examples/puya-ts
        run: npm ci

      - name: Run examples unit tests
        working-directory: examples/puya-ts
        run: npm test

      - name: Start LocalNet
        run: |
          pipx install algokit --python 3.12.6
          algokit localnet start
          npx --yes wait-on tcp:4001 -t 30000

      - name: Verify all examples
        working-directory: examples/puya-ts
        run: bash verify-all.sh
