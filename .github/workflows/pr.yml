name: Pull Request

on:
  pull_request:
    branches:
      - main
      - alpha

permissions:
  contents: read
  checks: write

jobs:
  ci-all:
    name: 'Build and test all packages'
    uses: ./.github/workflows/ci-all.yml
    with:
      run-commit-lint: true

  check-puya:
    name: 'Check puya dependency'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 1 }
      - name: Ensure targeted puya is a production release
        run: |
          version=$(grep -oP "targetedPuyaVersion\s*:\s*['\"]\K[^'\"]+" src/constants.ts)
          echo "Targeted puya version: $version"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::targetedPuyaVersion '$version' is a pre-release; production releases require a stable puya version."
            exit 1
          fi

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: docs/package.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile --dir docs

      - name: Verify documentation builds
        run: pnpm --dir docs run build
