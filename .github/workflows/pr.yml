name: Pull Request

on:
  pull_request:
    branches:
      - main
      - alpha

permissions:
  contents: read
  checks: write

jobs:
  ci-all:
    name: 'Build and test all packages'
    uses: ./.github/workflows/ci-all.yml
    with:
      run-commit-lint: true

  check-docs:
    name: Check docs
    uses: algorandfoundation/algokit-shared-config/.github/workflows/check-docs.yml@chore/node-npm
