name: Pull Request

on:
  pull_request:
    branches:
      - main
      - alpha

permissions:
  contents: read
  checks: write

jobs:
  ci-all:
    name: 'Build and test all packages'
    uses: ./.github/workflows/ci-all.yml
    with:
      run-commit-lint: true

  check-puya:
    name: 'Check puya dependency'
    needs: ci-all
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - run: npm ci --ignore-scripts

      - name: Download puya-ts artifact
        uses: actions/download-artifact@v8
        with:
          pattern: 'puya-ts-node-22.x'
          path: artifacts/puya-ts

      - name: Check puya
        run: |
          cd artifacts/puya-ts
          node cli.mjs --version | grep -E "^puya [0-9]+\.[0-9]+\.[0-9]+$" || exit 1

  check-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - uses: pnpm/action-setup@v5
        with:
          package_json_file: docs/package.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile --dir docs

      - name: Verify documentation builds
        run: pnpm --dir docs run build
