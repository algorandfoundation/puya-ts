name: Publish DevPortal Docs

on:
  workflow_dispatch:
  push:
    branches: [ci/add-publish-to-devportal-workflow] # change to the branch you want to publish doc artifacts from
    tags: ['v*']

permissions:
  contents: write

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: docs/package.json

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile --dir docs

      - name: Build documentation
        run: pnpm --dir docs run build

      - name: Publish DevPortal Docs
        uses: algorandfoundation/devportal/.github/actions/publish-devportal-docs@release/ak-v4
        with:
          docs-dir: docs
